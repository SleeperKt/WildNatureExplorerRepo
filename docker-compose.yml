services:
  db:
    # PostgreSQL 15 + PostGIS 3.4. Same PG 15 server as `postgres:15`, so the
    # existing data volume is fully compatible. Required for the PostGIS-based
    # geo features (radius search, simulate_path_with_dangers).
    image: postgis/postgis:15-3.4
    container_name: wild-nature-explorer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    networks:
      - wne-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wild-nature-explorer-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      HF_API_KEY: ${HF_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ANIMALDETECT_API_KEY: ${ANIMALDETECT_API_KEY}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
    ports:
      - "${PORT}:5000"
    volumes:
      - data-protection-dev:/home/appuser/.aspnet/DataProtection-Keys
    networks:
      - wne-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        WNE_API_PUBLIC_BASE_URL: ""
    container_name: wild-nature-explorer-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5174}:80"
    volumes:
      - ./docker/nginx-frontend.compose.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wne-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data-dev:
  data-protection-dev:

networks:
  wne-net:
