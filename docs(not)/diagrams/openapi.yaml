openapi: 3.0.1

info:
  title: WildNatureExplorer API
  description: |
    WildNatureExplorer API provides authentication, user profile management,
    and AI-powered nature exploration features including image analysis
    and interactive question sessions.
  version: 1.0.0

servers:
  - url: https://localhost:5000/api
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: User authentication and registration
  - name: Users
    description: User profile management
  - name: AI
    description: AI-powered nature analysis and interaction

paths:

  /Auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account using email and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDto'
            example:
              email: user@example.com
              password: StrongP@ss12
              firstName: John
              lastName: Doe
      responses:
        "200":
          description: User registered successfully
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Auth/login:
    post:
      tags: [Auth]
      summary: User login
      description: Authenticates a user and returns a JWT access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserDto'
            example:
              email: user@example.com
              password: StrongP@ss12
      responses:
        "200":
          description: JWT token returned
          content:
            application/json:
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /Users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      description: Returns profile data of the authenticated user.
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        "401":
          description: Unauthorized

    put:
      tags: [Users]
      summary: Update current user profile
      description: Updates first name, last name, or email of the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
            example:
              firstName: Jane
              lastName: Doe
              email: jane.doe@example.com
      responses:
        "204":
          description: Profile updated successfully
        "400":
          description: Validation error

    delete:
      tags: [Users]
      summary: Delete user account
      description: Permanently deletes the authenticated user's account.
      responses:
        "204":
          description: Account deleted

  /ai/analyze:
    post:
      tags: [AI]
      summary: Analyze nature image
      description: Uploads an image and returns AI-based structured analysis.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Analysis result
        "400":
          description: Invalid image
        "401":
          description: Unauthorized

  /ai/ask/{sessionId}:
    post:
      tags: [AI]
      summary: Ask a question about nature
      description: Sends a question to an existing AI session.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiQuestionDto'
            example:
              questionAboutNature: "Why do wolves howl at night?"
      responses:
        "200":
          description: AI answer returned
        "400":
          description: Validation error

  /ai/feedback/{sessionId}:
    post:
      tags: [AI]
      summary: Submit AI session feedback
      description: Submits rating and optional comment for an AI session.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiFeedbackDto'
            example:
              rating: 85
              comment: "Very informative and accurate"
      responses:
        "200":
          description: Feedback submitted

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Use JWT access token with Bearer prefix

  schemas:

    LoginUserDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 32
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: StrongP@ss12

    RegisterUserDto:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          maxLength: 32
        password:
          type: string
          minLength: 8
          maxLength: 20
        firstName:
          type: string
          maxLength: 16
        lastName:
          type: string
          maxLength: 16

    UpdateUserDto:
      type: object
      required: [email, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          maxLength: 32
        firstName:
          type: string
          maxLength: 16
        lastName:
          type: string
          maxLength: 16

    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        isActive:
          type: boolean

    AiQuestionDto:
      type: object
      required: [questionAboutNature]
      properties:
        questionAboutNature:
          type: string
          minLength: 8
          maxLength: 100
          example: "Why do birds migrate in winter?"

    AiFeedbackDto:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 100
          example: 90
        comment:
          type: string
          maxLength: 100
          example: "Great explanation"

    ErrorResponse:
      type: object
      properties:
        type:
          type: string
          example: validation_error
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 400
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              messages:
                type: array
                items:
                  type: string
