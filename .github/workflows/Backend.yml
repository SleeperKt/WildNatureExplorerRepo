name: Backend CI/CD

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "Deployment environment (dev/test/prod)"
        required: true
        type: string
      SKIP_DB_SETUP:
        description: "Skip DB setup"
        required: false
        default: false
        type: boolean
      SKIP_DEPLOY:
        description: "Skip deploy"
        required: false
        default: false
        type: boolean
      RUN_INTEGRATION_TESTS:
        description: "Run integration tests"
        required: false
        default: true
        type: boolean
      DOCKER_BUILD:
        description: "Build Docker image"
        required: false
        default: true
        type: boolean
      DOCKER_PUSH:
        description: "Push Docker image"
        required: false
        default: true
        type: boolean
    secrets:
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      DB_NAME:
        required: true
      JWT_SECRET:
        required: true
      DOCKER_REGISTRY_URL:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: Build project
        run: dotnet build ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj --no-restore --configuration Release

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run code analysis (placeholder)
        run: echo "Run static analysis / Sonar here"
        
  db-setup:
    name: DB Setup
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.SKIP_DB_SETUP != 'true' }}
  
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
          
      - name: Debug env
        run: |
          echo "DB_HOST=$DB_HOST"
          echo "DB_USER=$DB_USER"
          echo "DB_PASSWORD=$DB_PASSWORD"

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            PGPASSWORD="${{ secrets.DB_PASSWORD }}" pg_isready -h postgres -p 5432 -U "${{ secrets.DB_USER }}" && break
            sleep 2
          done
  
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
  
      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj
  
      - name: Run EF migrations
        env:
          DB_HOST: postgres
          DB_PORT: 5432
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          dotnet ef database update \
            --project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj


  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run unit tests
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --no-build --filter "Category=Unit"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, db-setup]
    if: ${{ inputs.RUN_INTEGRATION_TESTS == 'true' }}
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run integration tests
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --no-build --filter "Category=Integration"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.DOCKER_BUILD == 'true' }}
    env:
      DOCKER_REGISTRY_URL: ${{ secrets.DOCKER_REGISTRY_URL }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ secrets.DOCKER_REGISTRY_URL }} -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_REGISTRY_URL }}/wne-api:${{ github.sha }} -f ./docker/Dockerfile ./code/WildNatureExplorer.API
      - name: Push Docker image
        if: ${{ inputs.DOCKER_PUSH == 'true' }}
        run: docker push ${{ secrets.DOCKER_REGISTRY_URL }}/wne-api:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: ${{ inputs.SKIP_DEPLOY != 'true' }}
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Deploy placeholder
        run: echo "Deploy app to Azure / Kubernetes here"
      - name: Healthcheck
        run: echo "Run healthcheck after deploy"
