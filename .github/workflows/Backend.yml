name: Backend CI/CD

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "Deployment environment (dev/test/prod)"
        required: true
        type: string
      SKIP_DB_SETUP:
        description: "Skip DB setup"
        required: false
        default: false
        type: boolean
      SKIP_DEPLOY:
        description: "Skip deploy"
        required: false
        default: false
        type: boolean
      RUN_INTEGRATION_TESTS:
        description: "Run integration tests"
        required: true
        default: true
        type: boolean
      DOCKER_BUILD:
        description: "Build Docker image"
        required: true
        default: true
        type: boolean
    secrets:
      JWT_KEY:
        required: true
      JWT_ISSUER:
        required: true
      JWT_AUDIENCE:
        required: true
      GROQ_API_KEY:
        required: true
      HF_API_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      AZURE_CREDENTIALS:
        required: true
      AZURE_STORAGE_ACCOUNT:
        required: true
      AZURE_STORAGE_KEY:
        required: true
      DB_HOST:
        required: true
      DB_PORT:
        required: true
      DB_NAME:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: Build project
        run: dotnet build ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj --no-restore --configuration Release

  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run dotnet format
        run: |
          dotnet tool install -g dotnet-format
          dotnet-format ./WildNatureExplorer.sln --check

  db-setup:
    name: DB Setup
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.SKIP_DB_SETUP != 'true' }}
    
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wild_nature_explorer
      DB_USER: postgres
      DB_PASSWORD: postgres
  
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wild_nature_explorer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
  
      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER && break
            sleep 2
          done
  
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
  
      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj
  
      - name: Run EF migrations
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }}
        run: |
          dotnet ef database update \
            --project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: List migrations
        run: |
          dotnet ef migrations list \
            --project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run unit tests
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --filter "Category=Unit"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, db-setup]
    if: ${{ inputs.RUN_INTEGRATION_TESTS == true }}
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Run integration tests
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --filter "Category=Integration"

  azure-db-migrations:
    name: Apply Migrations to Azure DB
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.SKIP_DEPLOY != true }}
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
  
      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
  
      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj
  
      - name: Apply EF migrations to Azure DB
        env:
          ConnectionStrings__DefaultConnection: Host=${{ secrets.DB_HOST }};Port=${{ secrets.DB_PORT }};Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }}
        run: |
          dotnet ef database update \
            --project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj
  
      - name: List applied migrations
        run: |
          dotnet ef migrations list \
            --project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.DOCKER_BUILD == true }}
    steps:
      - uses: actions/checkout@v4
  
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  
      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:${{ github.sha }} \
            .
  
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:${{ github.sha }}

  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: ${{ inputs.SKIP_DEPLOY != true }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Web App (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: "wild-nature-explorer-web-app"
          images: "${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest"
          configuration-settings: |
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            HF_API_KEY=${{ secrets.HF_API_KEY }}
            JWT_KEY=${{ secrets.JWT_KEY }}
            AZURE_STORAGE_ACCOUNT=${{ secrets.AZURE_STORAGE_ACCOUNT }}
            AZURE_STORAGE_KEY=${{ secrets.AZURE_STORAGE_KEY }}

