  #           --project ./code/WildNatureExplorer.Infrastructure/WildNatureExplorer.Infrastructure.csproj \
  #           --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

  docker-build-api:
    name: Docker — API build & push
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.DOCKER_BUILD == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-api:${{ github.sha }}

  docker-build-frontend:
    name: Docker — frontend build & push
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.DOCKER_BUILD == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg WNE_API_PUBLIC_BASE_URL="${{ secrets.WNE_API_PUBLIC_BASE_URL }}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-web:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/wne-web:${{ github.sha }} \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-web:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wne-web:${{ github.sha }}

  deploy-api:
    name: Deploy API (Azure Web App container)
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    needs: [docker-build-api, supabase-db-migrations]
    if: ${{ inputs.SKIP_DEPLOY != true }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure App Service settings (API)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          app-settings-json: |
            [
              { "name": "JWT_KEY", "value": "${{ secrets.JWT_KEY }}" },
              { "name": "JWT_ISSUER", "value": "${{ secrets.JWT_ISSUER }}" },
              { "name": "JWT_AUDIENCE", "value": "${{ secrets.JWT_AUDIENCE }}" },
              { "name": "ASPNETCORE_ENVIRONMENT", "value": "${{ inputs.ENVIRONMENT == 'prod' && 'Production' || inputs.ENVIRONMENT == 'test' && 'Staging' || 'Development' }}" },

              { "name": "DB_HOST", "value": "${{ secrets.DB_HOST }}" },
              { "name": "DB_PORT", "value": "${{ secrets.DB_PORT }}" },
              { "name": "DB_USER", "value": "${{ secrets.DB_USER }}" },
              { "name": "DB_PASSWORD", "value": "${{ secrets.DB_PASSWORD }}" },
              { "name": "DB_NAME", "value": "${{ secrets.DB_NAME }}" },

              { "name": "GROQ_API_KEY", "value": "${{ secrets.GROQ_API_KEY }}" },
              { "name": "HF_API_KEY", "value": "${{ secrets.HF_API_KEY }}" },
              { "name": "ANIMALDETECT_API_KEY", "value": "${{ secrets.ANIMALDETECT_API_KEY }}" },
              { "name": "CORS_ORIGINS", "value": "${{ secrets.CORS_ORIGINS }}" },
              { "name": "ADMIN_EMAIL", "value": "${{ secrets.ADMIN_EMAIL }}" }
            ]
          mask-inputs: true

      - name: Deploy API container
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          images: "${{ secrets.DOCKERHUB_USERNAME }}/wne-api:latest"

      - name: Verify API health (public URL)
        run: |
          set -e
          BASE="${{ secrets.WNE_API_PUBLIC_BASE_URL }}"
          BASE="${BASE%/}"
          echo "Checking ${BASE}/health ..."
          ok=0
          for i in $(seq 1 30); do
            if curl -sf --max-time 25 "${BASE}/health" >/dev/null; then
              ok=1
              break
            fi
            echo "Attempt ${i}: waiting for API..."
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::API health check failed after deploy"
            exit 1
          fi
          echo "API health OK"

  deploy-frontend:
    name: Deploy frontend (Azure Web App container)
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    needs: [docker-build-frontend, supabase-db-migrations]
    if: ${{ inputs.SKIP_DEPLOY != true }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          
      - name: Set Azure App Service settings (Frontend)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_FRONTEND_NAME }}
          app-settings-json: |
            [
              { "name": "WNE_API_PUBLIC_BASE_URL", "value": "${{ secrets.WNE_API_PUBLIC_BASE_URL }}" }
            ]
          mask-inputs: true

      - name: Deploy frontend container
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_FRONTEND_NAME }}
          images: "${{ secrets.DOCKERHUB_USERNAME }}/wne-web:latest"

      - name: Verify frontend (public URL)
        env:
          BASE_URL: ${{ secrets.WNE_FRONTEND_PUBLIC_URL }}
        run: |
          if [ -z "${BASE_URL:-}" ]; then
            echo "WNE_FRONTEND_PUBLIC_URL not set — skipping SPA HTTP check"
            exit 0
          fi
          BASE="${BASE_URL%/}"
          echo "Checking ${BASE}/ ..."
          ok=0
          for i in $(seq 1 30); do
            if curl -sfL --max-time 25 -o /dev/null "${BASE}/"; then
              ok=1
              break
            fi
            echo "Attempt ${i}: waiting for frontend..."
            sleep 10
          done
          if [ "$ok" != "1" ]; then
            echo "::error::Frontend HTTP check failed after deploy"
            exit 1
          fi
          echo "Frontend OK"

  ci-notify-failure:
    name: Notify on pipeline failure
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-build
      - backend-lint
      - frontend-build
      - frontend-prettier
      - db-setup
      - unit-tests
      - integration-tests
      - supabase-db-migrations
      - docker-build-api
      - docker-build-frontend
      - deploy-api
      - deploy-frontend
    steps:
      - name: Summarize job results & notify webhook
        uses: actions/github-script@v7
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
          WEBHOOK_URL: ${{ secrets.CI_FAILURE_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const needs = JSON.parse(process.env.NEEDS_JSON || '{}');
            const webhook = process.env.WEBHOOK_URL || '';
            const runUrl = process.env.RUN_URL || '';
            const failed = [];
            for (const [name, data] of Object.entries(needs)) {
              if (data.result === 'failure') failed.push(name);
            }
            if (failed.length === 0) {
              core.info('No failed jobs in dependency graph — skipping notify.');
              return;
            }
            const lines = [
              '*Wild Nature Explorer - CI/CD failure*',
              `Workflow: ${context.workflow}`,
              `Repo: ${context.repo.owner}/${context.repo.repo}`,
              `Ref: ${context.ref}`,
              `SHA: \`${context.sha.substring(0, 7)}\``,
              `Run: ${runUrl}`,
              `Failed jobs: ${failed.join(', ')}`,
            ];
            const text = lines.join('\n');
            core.summary.addRaw(text.replace(/\*/g, '') + '\n').write();
            if (!webhook) {
              core.warning('CI_FAILURE_WEBHOOK_URL secret is not set — summary written only.');
              return;
            }
            try {
              const res = await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text }),
              });
              if (!res.ok) {
                core.warning(`Webhook POST failed: HTTP ${res.status}`);
              }
            } catch (e) {
              core.warning(`Webhook error: ${e.message}`);
            }
