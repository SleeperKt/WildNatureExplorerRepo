name: Backend & Frontend CI/CD

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "GitHub Environment name (dev / test / prod). Used for deploy gates and ASPNETCORE_ENVIRONMENT mapping."
        required: true
        type: string
      SKIP_DB_SETUP:
        description: "Skip DB setup"
        required: false
        default: false
        type: boolean
      SKIP_DEPLOY:
        description: "Skip deploy"
        required: false
        default: false
        type: boolean
      RUN_INTEGRATION_TESTS:
        description: "Run integration tests"
        required: true
        default: true
        type: boolean
      DOCKER_BUILD:
        description: "Build Docker images"
        required: true
        default: true
        type: boolean
    secrets:
      JWT_KEY:
        required: true
      JWT_ISSUER:
        required: true
      JWT_AUDIENCE:
        required: true
      GROQ_API_KEY:
        required: true
      HF_API_KEY:
        required: true
      ANIMALDETECT_API_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      AZURE_CREDENTIALS:
        required: true
      DB_HOST:
        required: true
      DB_PORT:
        required: true
      DB_NAME:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      ADMIN_EMAIL:
        required: true
      WNE_API_PUBLIC_BASE_URL:
        required: true
      CORS_ORIGINS:
        required: true
      AZURE_WEBAPP_API_NAME:
        required: true
      AZURE_WEBAPP_FRONTEND_NAME:
        required: true

jobs:
  backend-build:
    name: Backend — build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: Build project
        run: dotnet build ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj --no-restore --configuration Release

  backend-lint:
    name: Backend — lint
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - name: Run dotnet format
        run: dotnet format ./WildNatureExplorer.sln --verify-no-changes --verbosity minimal

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.WNE_API_PUBLIC_BASE_URL }}
        run: npm run build

  db-setup:
    name: DB setup (CI Postgres + EF)
    runs-on: ubuntu-latest
    needs: backend-build
    if: ${{ inputs.SKIP_DB_SETUP != true }}

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wild_nature_explorer
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_KEY: ${{ secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wild_nature_explorer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER && break
            sleep 2
          done

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: Run EF migrations (CI database)
        run: |
          dotnet ef database update \
            --project ./code/WildNatureExplorer.Infrastructure/WildNatureExplorer.Infrastructure.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: List migrations
        run: |
          dotnet ef migrations list \
            --project ./code/WildNatureExplorer.Infrastructure/WildNatureExplorer.Infrastructure.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [backend-build, backend-lint]
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - name: Run unit tests
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --filter "Category=Unit"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend]
    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - name: Run integration tests
        if: ${{ inputs.RUN_INTEGRATION_TESTS == true }}
        run: dotnet test ./WildNatureExplorer.Tests/WildNatureExplorer.Tests.csproj --filter "Category=Integration"
      - name: Skip integration tests (workflow input)
        if: ${{ inputs.RUN_INTEGRATION_TESTS != true }}
        run: echo "Skipping integration tests (RUN_INTEGRATION_TESTS=false)."
        
  supabase-db-migrations:
    name: Apply migrations (Supabase Postgres)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: ${{ inputs.SKIP_DEPLOY != true }}

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj

      - name: Run EF migrations (Supabase DB)
        run: |
          dotnet ef database update \
            --project ./code/WildNatureExplorer.Infrastructure/WildNatureExplorer.Infrastructure.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj \
            --connection "Host=${{ secrets.DB_HOST }};Port=${{ secrets.DB_PORT }};Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};SSL Mode=Require;Trust Server Certificate=true"

      - name: List applied migrations
        run: |
          dotnet ef migrations list \
            --project ./code/WildNatureExplorer.Infrastructure/WildNatureExplorer.Infrastructure.csproj \
            --startup-project ./code/WildNatureExplorer.API/WildNatureExplorer.API.csproj
            
